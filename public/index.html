<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SB File Share | Sharing is caring</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 40px;
        box-sizing: border-box;
      }

      .container {
        display: flex;
        gap: 20px;
        max-width: 1200px;
        margin: auto;
        flex-wrap: wrap;
      }

      .box {
        background: white;
        padding: 25px;
        border-radius: 10px;
        flex: 1;
        min-width: 300px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      #drop {
        border: 2px dashed #888;
        padding: 40px;
        text-align: center;
        margin-bottom: 20px;
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.2s;
      }

      #drop:hover {
        background: #f9f9f9;
      }

      .progress {
        height: 10px;
        background: #ddd;
        margin-top: 10px;
        border-radius: 5px;
        overflow: hidden;
      }

      .bar {
        height: 100%;
        width: 0%;
        background: #4caf50;
        transition: width 0.2s;
      }

      .file {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        background: #fdfdfd;
        border: 1px solid #eee;
        margin-bottom: 6px;
        border-radius: 4px;
      }

      button {
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #e60000;
      }

      /* New Room Setup Styles */
      .room-setup {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        align-items: center;
      }

      .room-setup input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .room-setup button {
        background: #4caf50;
      }

      .room-setup button:hover {
        background: #45a049;
      }

      #text-sync-area {
        display: none; /* Hidden until connected */
      }

      #shared-text {
        width: 100%;
        height: 300px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        resize: vertical;
        font-family: monospace;
        font-size: 14px;
        box-sizing: border-box;
      }

      .status {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
      }

      .btn-secondary {
        background: #888;
      }

      .btn-secondary:hover {
        background: #666;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- File Share Box -->
      <div class="box">
        <h2>File Share</h2>
        <div id="drop">Drop files here or click to browse</div>
        <div class="progress">
          <div class="bar" id="bar"></div>
        </div>
        <h3>Files</h3>
        <div id="files"></div>
      </div>

      <!-- WebRTC Text Sync Box -->
      <div class="box">
        <h2>Real-time Shared Notes</h2>

        <!-- Room Connection Panel -->
        <div class="room-setup" id="room-setup">
          <button id="create-btn" style="background: #007bff">
            Create New Session
          </button>
          <span> OR </span>
          <input type="text" id="room-code" placeholder="Enter session code" />
          <button id="join-btn">Join</button>
        </div>

        <!-- Hidden until connected -->
        <div
          id="session-info"
          style="
            display: none;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #333;
          "
        >
          <div>
            Session Code:
            <span
              id="display-code"
              style="color: #4caf50; font-family: monospace; font-size: 1.2em"
            ></span>
          </div>
          <div
            id="expiry-display"
            style="font-size: 12px; color: #666; font-weight: normal"
          ></div>
          <button
            id="leave-btn"
            class="btn-secondary"
            style="padding: 4px 8px; font-size: 12px"
          >
            Leave Session
          </button>
        </div>

        <div id="text-sync-area">
          <textarea
            id="shared-text"
            placeholder="Type here... Text syncs instantly P2P via WebRTC!"
          ></textarea>
          <div class="status" id="peer-count">Connected Peers: 0</div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const drop = document.getElementById("drop");
      const bar = document.getElementById("bar");
      const filesContainer = document.getElementById("files");

      const roomSetup = document.getElementById("room-setup");
      const roomCodeInput = document.getElementById("room-code");
      const joinBtn = document.getElementById("join-btn");
      const createBtn = document.getElementById("create-btn");
      const leaveBtn = document.getElementById("leave-btn");
      const sessionInfo = document.getElementById("session-info");
      const displayCode = document.getElementById("display-code");
      const expiryDisplay = document.getElementById("expiry-display");
      const textSyncArea = document.getElementById("text-sync-area");
      const textarea = document.getElementById("shared-text");
      const peerCountDisplay = document.getElementById("peer-count");

      // ==========================================
      // FILE SHARE LOGIC (Original)
      // ==========================================
      function upload(file) {
        const form = new FormData();
        form.append("file", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload");

        xhr.upload.onprogress = (e) => {
          const percent = (e.loaded / e.total) * 100;
          bar.style.width = percent + "%";
        };

        xhr.onload = () => {
          bar.style.width = "0%";
        };

        xhr.send(form);
      }

      drop.onclick = () => {
        const i = document.createElement("input");
        i.type = "file";
        i.onchange = () => upload(i.files[0]);
        i.click();
      };

      drop.ondragover = (e) => e.preventDefault();
      drop.ondrop = (e) => {
        e.preventDefault();
        upload(e.dataTransfer.files[0]);
      };

      function addFile(f) {
        if (document.getElementById(f.file)) return; // prevent dupes
        const div = document.createElement("div");
        div.className = "file";
        div.id = f.file;

        const a = document.createElement("a");
        a.href = f.url;
        a.innerText = f.name;
        a.download = f.name;
        a.target = "_blank";

        const del = document.createElement("button");
        del.innerText = "Delete";

        del.onclick = async () => {
          await fetch("/delete/" + f.file, { method: "DELETE" });
        };

        div.appendChild(a);
        div.appendChild(del);
        filesContainer.appendChild(div);
      }

      socket.on("new_file", addFile);
      socket.on("file_deleted", (f) => {
        const el = document.getElementById(f);
        if (el) el.remove();
      });

      fetch("/list")
        .then((r) => r.json())
        .then((list) => list.forEach(addFile));

      // ==========================================
      // WEBRTC TEXT SYNC LOGIC
      // ==========================================
      const peers = {}; // Dictionary of connected peers { socketId: { pc, dc } }
      const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
      let hasJoined = false,
        timer;

      // Handle Room Creation
      createBtn.onclick = () => {
        if (timer) {
          clearInterval(timer);
        }
        socket.emit("create_room", (data) => {
          hasJoined = true;
          roomSetup.style.display = "none";
          sessionInfo.style.display = "flex";
          displayCode.innerText = data.code;
          expiryDisplay.innerText = `(Expires: ${updateCountdown(new Date(data.expiresAt))})`;
          setInterval(() => {
            expiryDisplay.innerText = `(Expires: ${updateCountdown(new Date(data.expiresAt))})`;
          }, 1000);
          textSyncArea.style.display = "block";
        });
      };

      function updateCountdown(expiry) {
        const now = new Date();
        const diff = expiry - now;

        if (diff <= 0) {
          return "Expired";
          clearInterval(timer);
          return;
        }

        const seconds = Math.floor(diff / 1000) % 60;
        const minutes = Math.floor(diff / (1000 * 60)) % 60;
        const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;

        return `${hours}h ${minutes}m ${seconds}s`;
      }

      // Handle Room Join
      joinBtn.onclick = () => {
        const code = roomCodeInput.value.trim().toUpperCase();
        if (!code) {
          alert("Please enter a connection code.");
          return;
        }

        socket.emit("join_room", code, (response) => {
          if (timer) {
            clearInterval(timer);
          }
          if (response.success) {
            hasJoined = true;
            roomSetup.style.display = "none";
            sessionInfo.style.display = "flex";
            displayCode.innerText = code;
            expiryDisplay.innerText = `(Expires: ${updateCountdown(new Date(data.expiresAt))})`;
            setInterval(() => {
              expiryDisplay.innerText = `(Expires: ${updateCountdown(new Date(data.expiresAt))})`;
            }, 1000);
            textSyncArea.style.display = "block";
          } else {
            alert(response.message);
          }
        });
      };

      // Handle Room Leave
      leaveBtn.onclick = () => {
        if (!hasJoined) return;

        if (timer) {
          clearInterval(timer);
        }

        // Tell the server we are leaving the room
        socket.emit("leave_room");

        // Close all peer connections cleanly
        Object.keys(peers).forEach((peerId) => {
          if (peers[peerId] && peers[peerId].pc) {
            peers[peerId].pc.close();
          }
          delete peers[peerId];
        });

        hasJoined = false;
        textarea.value = ""; // clear text for privacy
        updatePeerCount();

        // Revert UI to initial state
        sessionInfo.style.display = "none";
        textSyncArea.style.display = "none";
        roomSetup.style.display = "flex";
        roomCodeInput.value = ""; // clear the input box
      };

      function updatePeerCount() {
        peerCountDisplay.innerText = `Connected Peers: ${Object.keys(peers).length}`;
      }

      function setupDataChannel(dc, peerId) {
        dc.onopen = () => {
          // Send our current text to the newly connected peer
          if (textarea.value) {
            dc.send(JSON.stringify({ type: "sync", text: textarea.value }));
          }
        };

        dc.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.type === "sync" && textarea.value !== data.text) {
            textarea.value = data.text;
          }
        };
      }

      function setupPeerConnection(pc, peerId) {
        pc.onicecandidate = (e) => {
          if (e.candidate) {
            socket.emit("signal", { to: peerId, signal: e.candidate });
          }
        };
      }

      // Handle broadcasting text input to all peers
      textarea.addEventListener("input", () => {
        const text = textarea.value;
        Object.values(peers).forEach((peer) => {
          if (peer.dc && peer.dc.readyState === "open") {
            peer.dc.send(JSON.stringify({ type: "sync", text }));
          }
        });
      });

      // 1. A new peer joined the same room, we are the initiator
      socket.on("peer_joined", async (peerId) => {
        if (!hasJoined) return; // Ignore if we haven't joined a room yet

        const pc = new RTCPeerConnection(config);
        const dc = pc.createDataChannel("text-sync");

        peers[peerId] = { pc, dc };
        updatePeerCount();

        setupPeerConnection(pc, peerId);
        setupDataChannel(dc, peerId);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("signal", { to: peerId, signal: offer });
      });

      // 2. Handle incoming WebRTC signaling (Offer/Answer/ICE)
      socket.on("signal", async (data) => {
        if (!hasJoined) return;

        const { from, signal } = data;
        let peer = peers[from];

        // If we don't know this peer yet, we are the receiver
        if (!peer) {
          const pc = new RTCPeerConnection(config);
          peer = { pc, dc: null };
          peers[from] = peer;
          updatePeerCount();

          setupPeerConnection(pc, from);

          // Listen for the incoming data channel
          pc.ondatachannel = (e) => {
            peer.dc = e.channel;
            setupDataChannel(peer.dc, from);
          };
        }

        // Process WebRTC Signals
        if (signal.type === "offer") {
          await peer.pc.setRemoteDescription(new RTCSessionDescription(signal));
          const answer = await peer.pc.createAnswer();
          await peer.pc.setLocalDescription(answer);
          socket.emit("signal", { to: from, signal: answer });
        } else if (signal.type === "answer") {
          await peer.pc.setRemoteDescription(new RTCSessionDescription(signal));
        } else if (signal.candidate) {
          await peer.pc.addIceCandidate(new RTCIceCandidate(signal));
        }
      });

      // 3. Cleanup on disconnect or when another peer leaves intentionally
      socket.on("peer_left", (peerId) => {
        if (peers[peerId]) {
          peers[peerId].pc.close();
          delete peers[peerId];
          updatePeerCount();
        }
      });
    </script>
  </body>
</html>
